ai_usage_summary: |
  AI tools were used for architecture discussion, code implementation support,
  documentation, and review. The ranking step is deterministic Python code and
  does not call any AI service or external API.

methodology_summary: |
  Deterministic evidence-based ranker for the Redrob Senior AI Engineer JD. The
  base score combines career-history template tiers, AI/ML title fit, real
  experience computed from career durations, product-company exposure, trusted
  JD-relevant skills, and location fit. Behavioral availability signals are
  applied afterward as a multiplier. Strict honeypot signatures are excluded.
  Reasoning strings are generated from the same evidence used for scoring.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
